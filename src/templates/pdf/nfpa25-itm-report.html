<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ITM_PROPERTY_NAME}} — NFPA 25 ITM Report</title>
    <style>
      @page {
        size: letter;
        margin: 0.45in 0.5in 0.6in;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 9pt;
        line-height: 1.35;
        color: #111;
        margin: 0;
        padding: 0;
        background: #fff;
      }

      .document-container {
        max-width: 8.5in;
        margin: 0 auto;
        padding: 0 0 24px;
      }

      /* Page header */
      .report-page-header {
        border-bottom: 1px solid #333;
        padding-bottom: 8px;
        margin-bottom: 12px;
        font-size: 8.5pt;
      }

      .report-header-top {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
      }

      .report-title {
        font-size: 14pt;
        font-weight: bold;
        margin: 0 0 2px;
      }

      .report-subtitle,
      .report-date {
        margin: 0;
        font-size: 9pt;
      }

      .property-label {
        font-weight: bold;
        margin: 0;
        text-transform: uppercase;
        font-size: 7.5pt;
      }

      .property-name {
        font-weight: bold;
        margin: 2px 0;
        font-size: 10pt;
      }

      .property-address {
        margin: 0;
        white-space: pre-line;
      }

      .report-header-meta {
        display: flex;
        gap: 24px;
        margin: 6px 0;
        font-size: 8pt;
      }

      .report-header-company {
        font-size: 8pt;
        line-height: 1.3;
      }

      .report-header-company p {
        margin: 0;
      }

      .company-name {
        font-weight: bold;
      }

      /* Content sections */
      .itm-report-body .report-main-title {
        font-size: 11pt;
        font-weight: bold;
        margin: 0 0 10px;
        text-align: center;
      }

      .section {
        margin-bottom: 14px;
      }

      .section-title {
        font-size: 10pt;
        font-weight: bold;
        text-transform: uppercase;
        margin: 0 0 8px;
        padding: 4px 6px;
        background: #e8e8e8;
        border: 1px solid #ccc;
        page-break-after: avoid;
      }

      .subsection {
        margin: 8px 0 12px;
      }

      .subsection-title {
        font-size: 9pt;
        font-weight: bold;
        margin: 0 0 6px;
        text-decoration: underline;
      }

      .question-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        padding: 4px 0;
        border-bottom: 1px solid #eee;
        page-break-inside: avoid;
      }

      .question-text {
        flex: 1;
        padding-right: 8px;
      }

      .yna-options {
        display: flex;
        gap: 10px;
        flex-shrink: 0;
        white-space: nowrap;
        font-size: 8pt;
      }

      .yna-options label {
        display: inline-flex;
        align-items: center;
        gap: 3px;
      }

      .box {
        display: inline-block;
        width: 11px;
        height: 11px;
        border: 1px solid #333;
        vertical-align: middle;
        text-align: center;
        line-height: 9px;
        font-size: 8px;
      }

      .box.checked::after {
        content: "✓";
        font-weight: bold;
      }

      .field-row {
        display: flex;
        gap: 8px;
        margin: 6px 0;
        font-size: 8.5pt;
      }

      .field-label {
        font-weight: bold;
      }

      .field-value {
        flex: 1;
        border-bottom: 1px solid #999;
        min-height: 14px;
      }

      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 7.5pt;
        margin: 8px 0 12px;
      }

      .data-table th,
      .data-table td {
        border: 1px solid #333;
        padding: 3px 4px;
        text-align: left;
        vertical-align: top;
      }

      .data-table th {
        background: #f0f0f0;
        font-weight: bold;
      }

      .deficiency-block {
        margin-bottom: 12px;
        padding: 8px;
        border: 1px solid #ccc;
        page-break-inside: avoid;
      }

      .deficiency-block h4 {
        margin: 0 0 6px;
        font-size: 9pt;
      }

      .deficiency-block p {
        margin: 4px 0;
      }

      .photo-note-block {
        padding: 8px;
        border: 1px solid #ddd;
        margin-bottom: 10px;
      }

      .none-indicator {
        font-style: italic;
        color: #444;
      }

      .page-break-before {
        page-break-before: always;
      }

      .report-document-footer {
        margin-top: 20px;
        padding-top: 8px;
        border-top: 1px solid #ccc;
        display: flex;
        justify-content: space-between;
        font-size: 7.5pt;
        color: #555;
      }

      @media print {
        body {
          background: white;
        }

        .document-container {
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="document-container">
      <div class="component-placeholder header-placeholder">[HEADER COMPONENTS]</div>
      <div class="component-placeholder content-placeholder">[CONTENT COMPONENTS]</div>
      <div class="report-document-footer">
        <span>{{ITM_COPYRIGHT}}</span>
        <span>Report generated {{ITM_PRINT_DATE}}</span>
      </div>
    </div>
  </body>
</html>
